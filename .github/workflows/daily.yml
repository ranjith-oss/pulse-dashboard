name: Daily MRR Update

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily (11:30 AM IST)
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  update-mrr:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: "[1/5] Fetch active subscriptions (current-month MRR snapshot)"
        env:
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
        run: |
          python3 pipeline/fetch_active_subscriptions.py

      - name: "[2/5] Fetch Paddle transaction report (historical months)"
        env:
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
        run: |
          python3 pipeline/fetch_paddle_report.py
          echo "CSV size: $(wc -l < pipeline/transaction_line_items.csv) lines"

      - name: "[3/5] Compute unified MRR (ChartMogul + Paddle)"
        run: |
          python3 pipeline/compute_mrr.py

      - name: "[4/5] Build interactive dashboard"
        run: |
          python3 pipeline/build_dashboard.py

      - name: "[5/5] Commit and push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html pipeline/mrr_data.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: daily MRR update $(date -u +%Y-%m-%d)"
          git push
